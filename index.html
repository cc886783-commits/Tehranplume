<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>德黑兰实时空袭烟羽图</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body,#map{height:100%;width:100%;background:#111}
  #map{position:relative;}

  .status{
    position:absolute;top:10px;left:10px;z-index:1000;
    background:rgba(0,0,0,0.7);color:#fff;padding:10px 14px;
    border-radius:8px;font-size:14px;
  }

  /* 浓度图例 */
  .legend{
    position:absolute;bottom:20px;right:20px;z-index:1000;
    background:rgba(0,0,0,0.8);color:#fff;padding:12px 14px;
    border-radius:8px;font-size:14px;line-height:1.7;
  }
  .legend span{
    display:inline-block;width:14px;height:14px;border-radius:3px;margin-right:8px;vertical-align:middle;
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="status" id="status">加载中...</div>

<!-- 浓度图例 -->
<div class="legend">
  <div><span style="background:#ff0000;"></span> > 0.01 kg/m³</div>
  <div><span style="background:#ffaa00;"></span> 0.001 ~ 0.01</div>
  <div><span style="background:#ffff00;"></span> 0.0001 ~ 0.001</div>
  <div><span style="background:#00ffff;"></span> ≤ 0.0001</div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map', {
    minZoom: 10,
    maxZoom: 17,
    zoomControl: true,
    attributionControl: false
  }).fitBounds([
    [35.58, 51.20],
    [35.82, 51.55]
  ]);

  L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png', {
    maxZoom: 17
  }).addTo(map);

  const status = document.getElementById('status');

  async function getTodayCoords() {
    try {
      const t = Date.now();
      const resp = await fetch(`https://seed-public.oss-cn-beijing.aliyuncs.com/tehran_today.json?t=${t}`, { cache: "no-store" });
      const data = await resp.json();
      return data.coords || [];
    } catch (e) {
      return [
        [35.7310, 51.4660],
        [35.7450, 51.4820],
        [35.7520, 51.4910],
        [35.7120, 51.4380],
        [35.6980, 51.4050],
        [35.6890, 51.3890],
        [35.6790, 51.3230],
        [35.6670, 51.2500]
      ];
    }
  }

  async function getWind(lat, lon) {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=ms`;
      const r = await fetch(url, { cache: "no-store" });
      const d = await r.json();
      const u = d.current.wind_speed_10m;
      const wd = d.current.wind_direction_10m;
      return (u > 0 && u < 30) ? [u, wd] : [2.2, 50];
    } catch (e) {
      return [2.2, 50];
    }
  }

  function plume(lat0, lon0, u, wd) {
    const points = [];
    const degPerM = 1 / 111320.0;
    const theta = (270 - wd) * Math.PI / 180;
    const Q = 80;
    const H = 10;
    const xMax = u * 3600;

    for (let i = 1; i <= 40; i++) {
      const x = (i / 40) * xMax;
      for (let j = -40; j <= 40; j++) {
        const y = (j / 40) * xMax;
        const sy = 0.32 * x / Math.sqrt(1 + 0.0004 * x);
        const sz = 0.24 * x / Math.sqrt(1 + 0.0003 * x);
        const c = (Q / (2 * Math.PI * u * sy * sz))
          * Math.exp(-y * y / (2 * sy * sy))
          * Math.exp(-H * H / (2 * sz * sz));
        if (c < 1e-5) continue;
        const xr = x * Math.cos(theta) - y * Math.sin(theta);
        const yr = x * Math.sin(theta) + y * Math.cos(theta);
        const lat = lat0 + yr * degPerM;
        const lon = lon0 + xr * degPerM;
        points.push([lat, lon, c]);
      }
    }
    return points;
  }

  function color(c) {
    if (c > 0.01) return '#ff0000';
    if (c > 0.001) return '#ffaa00';
    if (c > 0.0001) return '#ffff00';
    return '#00ffff';
  }

  (async function main() {
    const coords = await getTodayCoords();
    status.textContent = `✅ 今日目标：${coords.length} 个`;

    for (const [lat, lon] of coords) {
      const [u, wd] = await getWind(lat, lon);
      L.circleMarker([lat, lon], { radius:6, color:'red', fillColor:'red', fillOpacity:1 }).addTo(map);

      const points = plume(lat, lon, u, wd);
      const group = L.layerGroup().addTo(map);
      points.forEach(([plat, plon, c]) => {
        L.circleMarker([plat, plon], {
          radius: 1.5,
          color: color(c),
          fillColor: color(c),
          fillOpacity: 0.6
        }).addTo(group);
      });
    }
  })();
</script>
</body>
</html>
