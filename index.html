<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tehran Pollution Dispersion Model</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body,#map{height:100%;width:100%;background:#111}
  #map{position:relative;z-index:1}

  .control{
    position:absolute;top:10px;left:10px;z-index:1000;
    background:rgba(0,0,0,0.7);color:#fff;padding:8px 12px;
    border-radius:8px;font-size:14px;display:flex;gap:8px
  }
  .control button{
    padding:6px 10px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer
  }
  .control .edit{background:#e67e22}
  .control .save{background:#27ae60}

  .status{
    position:absolute;top:60px;left:10px;z-index:1000;
    background:rgba(0,0,0,0.7);color:#fff;padding:8px 12px;
    border-radius:8px;font-size:14px
  }

  .mouse-coord{
    position:absolute;bottom:10px;left:10px;z-index:1000;
    background:rgba(0,0,0,0.8);color:#fff;padding:8px 12px;
    border-radius:8px;font-size:14px
  }

  .legend{
    position:absolute;bottom:10px;right:10px;z-index:1000;
    background:rgba(0,0,0,0.8);color:#fff;padding:10px;
    border-radius:8px;font-size:14px;line-height:1.6
  }
  .legend span{
    display:inline-block;width:14px;height:14px;border-radius:3px;margin-right:6px;vertical-align:middle
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="control">
  <button class="edit" id="editBtn">Edit Mode (Click Map)</button>
  <button class="save" id="saveBtn">Save as Image</button>
</div>
<div class="status" id="status">👉 Click [Edit Mode] then click map to add source</div>

<div class="mouse-coord" id="mouseCoord">📍 Coord: -- , --</div>

<div class="legend">
  <div><span style="background:#ff0000;"></span> > 0.003 kg/m³</div>
  <div><span style="background:#ff5500;"></span> 0.001 ~ 0.003</div>
  <div><span style="background:#ff9100;"></span> 0.0003 ~ 0.001</div>
  <div><span style="background:#ffcc00;"></span> 0.0001 ~ 0.0003</div>
  <div><span style="background:#ffff00;"></span> 0.00003 ~ 0.0001</div>
  <div><span style="background:#0088ff;"></span> ≤ 0.00003</div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const map = L.map('map', {
  minZoom: 8, maxZoom: 18, zoomControl: true, attributionControl: false
}).setView([35.72, 51.42], 12);

L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const status = document.getElementById('status');
const editBtn = document.getElementById('editBtn');
const saveBtn = document.getElementById('saveBtn');
const mouseCoord = document.getElementById('mouseCoord');

let editMode = false;

map.on('mousemove', (e) => {
  const lat = e.latlng.lat.toFixed(5);
  const lng = e.latlng.lng.toFixed(5);
  mouseCoord.textContent = `📍 ${lat}, ${lng}`;
});

function plume(lat0, lon0, u, wd) {
  const points = [];
  const degPerM = 1 / 111320;
  const theta = (270 - wd) * Math.PI / 180;
  const Q = 80, H = 10;
  const xMax = u * 500;

  // 👇 更稀疏：i += 3，j += 3
  for (let i = 1; i <= 120; i += 3) {
    const x = (i / 120) * xMax;
    for (let j = -120; j <= 120; j += 3) {
      const y = (j / 120) * xMax;
      const sy = 0.32 * x / Math.sqrt(1 + 0.0004 * x);
      const sz = 0.24 * x / Math.sqrt(1 + 0.0003 * x);
      const c = (Q / (2 * Math.PI * u * sy * sz))
        * Math.exp(-y * y / (2 * sy * sy))
        * Math.exp(-H * H / (2 * sz * sz));
      if (c < 3e-6) continue;
      const xr = x * Math.cos(theta) - y * Math.sin(theta);
      const yr = x * Math.sin(theta) + y * Math.cos(theta);
      const lat = lat0 + yr * degPerM;
      const lon = lon0 + xr * degPerM;
      points.push([lat, lon, c]);
    }
  }
  return points;
}

// ======================
// 6 级浓度梯度
// ======================
function color(c) {
  if (c > 0.003)   return '#ff0000';
  if (c > 0.001)   return '#ff5500';
  if (c > 0.0003)  return '#ff9100';
  if (c > 0.0001)  return '#ffcc00';
  if (c > 0.00003) return '#ffff00';
  return '#0088ff';
}

async function getLocalWind(lat, lon) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=ms`;
    const r = await fetch(url);
    const d = await r.json();
    const speed = d.current.wind_speed_10m
    const dir = d.current.wind_direction_10m
    return [speed, dir];
  } catch (e) {
    return [2.2, 270];
  }
}

async function addPoint(lat, lng) {
  const [u, wd] = await getLocalWind(lat, lng);

  L.circleMarker([lat, lng], {
    radius: 6, color: 'red', fillColor: 'red', fillOpacity: 1
  }).addTo(map);

  const points = plume(lat, lng, u, wd);
  const group = L.layerGroup().addTo(map);
  
  points.forEach(([plat, plon, c]) => {
    L.circleMarker([plat, plon], {
      radius: 1.3,
      color: color(c),
      fillColor: color(c),
      fillOpacity: 0.75
    }).addTo(group);
  });

  status.textContent = `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)} | Wind: ${u.toFixed(1)}m/s Dir: ${wd}°`;
}

editBtn.onclick = () => {
  editMode = !editMode;
  editBtn.textContent = editMode ? "Exit Edit" : "Edit Mode (Click Map)";
  status.textContent = editMode ? "✅ Click map to add pollution source" : "👉 Exited Edit Mode";
};

map.on('click', async (e) => {
  if (editMode) await addPoint(e.latlng.lat, e.latlng.lng);
});

saveBtn.onclick = async () => {
  status.textContent = "📷 Generating image...";
  const canvas = await html2canvas(document.getElementById('map'), { useCORS: true, scale: 2 });
  const a = document.createElement('a');
  a.download = 'dispersion_simulation.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  status.textContent = "✅ Image saved";
};
</script>
</body>
</html>
